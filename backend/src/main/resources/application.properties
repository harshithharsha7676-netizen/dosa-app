# ── Application ──────────────────────────────────────────────
spring.application.name=dosa-ordering
server.port=8080
server.address=0.0.0.0

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/dosa_ordering_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ── Admin Credentials ────────────────────────────────────────
app.admin.username=admin
app.admin.password=admin123

# ── Session ──────────────────────────────────────────────────
server.servlet.session.timeout=8h

# ── WhatsApp Admin Number ────────────────────────────────────
app.whatsapp.admin.number=917676666246

# ── Second WhatsApp Number ──────────────────────────────────
# Set second WhatsApp number (with country code, e.g. 919876543210) or leave blank
app.whatsapp.second.number=

# ── CallMeBot WhatsApp Auto-Send (Free API) ─────────────────
# To enable auto-send without opening WhatsApp:
# 1. Send "I allow callmebot to send me messages" to +34 644 32 77 87 on WhatsApp
# 2. You will receive your API key
# 3. Paste your API key below
# Leave blank to use manual wa.me links instead
app.callmebot.apikey=
